services:
  redis-standalone:
    image: redis:7-alpine
    container_name: redis-standalone
    ports:
      - "6379:6379"
    command: redis-server --appendonly no

  redis-cluster-node-1:
    image: redis:7-alpine
    container_name: redis-cluster-1
    ports:
      - "7000:7000"
    command: redis-server --port 7000 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-node-2:
    image: redis:7-alpine
    container_name: redis-cluster-2
    ports:
      - "7001:7001"
    command: redis-server --port 7001 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-node-3:
    image: redis:7-alpine
    container_name: redis-cluster-3
    ports:
      - "7002:7002"
    command: redis-server --port 7002 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-node-4:
    image: redis:7-alpine
    container_name: redis-cluster-4
    ports:
      - "7003:7003"
    command: redis-server --port 7003 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-node-5:
    image: redis:7-alpine
    container_name: redis-cluster-5
    ports:
      - "7004:7004"
    command: redis-server --port 7004 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-node-6:
    image: redis:7-alpine
    container_name: redis-cluster-6
    ports:
      - "7005:7005"
    command: redis-server --port 7005 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no

  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-cluster-node-1
      - redis-cluster-node-2
      - redis-cluster-node-3
      - redis-cluster-node-4
      - redis-cluster-node-5
      - redis-cluster-node-6
    command: sh -c "sleep 3 && redis-cli --cluster create redis-cluster-node-1:7000 redis-cluster-node-2:7001 redis-cluster-node-3:7002 redis-cluster-node-4:7003 redis-cluster-node-5:7004 redis-cluster-node-6:7005 --cluster-replicas 1 --cluster-yes"

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6380:6379"
    command: redis-server --appendonly no

  redis-slave:
    image: redis:7-alpine
    container_name: redis-slave
    ports:
      - "6381:6379"
    command: redis-server --appendonly no --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
      - redis-slave
    command: sh -c "until redis-cli -h redis-master ping 2>/dev/null; do sleep 1; done && MASTER_IP=$$(getent hosts redis-master | cut -d' ' -f1) && echo 'port 26379' > /tmp/sentinel.conf && echo \"sentinel monitor mymaster $${MASTER_IP} 6379 1\" >> /tmp/sentinel.conf && echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf && echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf && echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"