services:
  redis-standalone:
    image: redis:7-alpine
    container_name: redis-standalone
    ports:
      - "6379:6379"
    command: redis-server --appendonly no

  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: redis-stack
    ports:
      - "6383:6379"

  redis-cluster-node-1:
    image: redis:7-alpine
    container_name: redis-cluster-1
    ports:
      - "7000:7000"
      - "17000:17000"
    command: redis-server --port 7000 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7000 --cluster-announce-bus-port 17000

  redis-cluster-node-2:
    image: redis:7-alpine
    container_name: redis-cluster-2
    ports:
      - "7001:7001"
      - "17001:17001"
    command: redis-server --port 7001 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7001 --cluster-announce-bus-port 17001

  redis-cluster-node-3:
    image: redis:7-alpine
    container_name: redis-cluster-3
    ports:
      - "7002:7002"
      - "17002:17002"
    command: redis-server --port 7002 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7002 --cluster-announce-bus-port 17002

  redis-cluster-node-4:
    image: redis:7-alpine
    container_name: redis-cluster-4
    ports:
      - "7003:7003"
      - "17003:17003"
    command: redis-server --port 7003 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7003 --cluster-announce-bus-port 17003

  redis-cluster-node-5:
    image: redis:7-alpine
    container_name: redis-cluster-5
    ports:
      - "7004:7004"
      - "17004:17004"
    command: redis-server --port 7004 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7004 --cluster-announce-bus-port 17004

  redis-cluster-node-6:
    image: redis:7-alpine
    container_name: redis-cluster-6
    ports:
      - "7005:7005"
      - "17005:17005"
    command: redis-server --port 7005 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly no --cluster-announce-ip host.docker.internal --cluster-announce-port 7005 --cluster-announce-bus-port 17005

  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-cluster-node-1
      - redis-cluster-node-2
      - redis-cluster-node-3
      - redis-cluster-node-4
      - redis-cluster-node-5
      - redis-cluster-node-6
    command: sh -c "sleep 3 && redis-cli --cluster create redis-cluster-1:7000 redis-cluster-2:7001 redis-cluster-3:7002 redis-cluster-4:7003 redis-cluster-5:7004 redis-cluster-6:7005 --cluster-replicas 1 --cluster-yes"

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6380:6379"
    command: redis-server --appendonly no

  redis-slave:
    image: redis:7-alpine
    container_name: redis-slave
    ports:
      - "6381:6379"
    command: redis-server --appendonly no --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
      - redis-slave
    command: sh -c "until redis-cli -h redis-master ping 2>/dev/null; do sleep 1; done && MASTER_IP=$$(getent hosts redis-master | cut -d' ' -f1) && echo 'port 26379' > /tmp/sentinel.conf && echo \"sentinel monitor mymaster $${MASTER_IP} 6379 1\" >> /tmp/sentinel.conf && echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf && echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf && echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"

  redis-ssl:
    image: redis:7-alpine
    container_name: redis-ssl
    ports:
      - "6382:6379"
    volumes:
      - ./redis-ssl-certs:/certs:ro
    command: redis-server --port 6379 --tls-port 6379 --tls-cert-file /certs/redis.crt --tls-key-file /certs/redis.key --tls-ca-cert-file /certs/ca.crt --tls-auth-clients no --appendonly no

  redis-test-data:
    image: redis:7-alpine
    container_name: redis-test-data
    depends_on:
      - redis-standalone
    volumes:
      - ./init-test-data.sh:/init-test-data.sh:ro
      - ./test-images:/test-images:ro
    environment:
      - REDIS_HOST=redis-standalone
    command: sh /init-test-data.sh