name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
            runner: macos-latest
          - target: aarch64-apple-darwin
            arch: aarch64
            runner: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Setup Sparkle Framework
        run: |
          chmod +x scripts/setup-sparkle.sh
          ./scripts/setup-sparkle.sh

      - name: Create .app bundle
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/build-app.sh
          VERSION="${GITHUB_REF_NAME#v}"
          
          if [ -n "$SPARKLE_PUBLIC_KEY" ]; then
            # Use printf to handle special characters safely
            sed -e "s|\${VERSION}|$VERSION|g" \
                -e "s|\${BUILD_NUMBER}|$BUILD_NUMBER|g" \
                -e "s|\${SPARKLE_PUBLIC_KEY}|$SPARKLE_PUBLIC_KEY|g" \
                Info.plist.sparkle > Info.plist
          fi
          
          ./scripts/build-app.sh "$VERSION" "$BUILD_NUMBER" "${{ matrix.target }}"

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          APPLE_CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temp-password-$(date +%s)"

          echo "$APPLE_CERTIFICATES_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATES_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          rm -f "$CERTIFICATE_PATH"

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          ENTITLEMENTS_PATH="entitlements.plist"

          cat > "$ENTITLEMENTS_PATH" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.network.server</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS_PATH" \
            --timestamp \
            "Rust Redis Desktop.app"

      - name: Create DMG
        run: |
          chmod +x scripts/create-dmg.sh
          brew install create-dmg
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/create-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "rust-redis-desktop-${{ matrix.arch }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 10m

      - name: Staple notarization
        run: |
          xcrun stapler staple "rust-redis-desktop-${{ matrix.arch }}.dmg"

      - name: Install pynacl for Sparkle signing
        run: pip3 install --break-system-packages pynacl

      - name: Sign DMG with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_FILE="rust-redis-desktop-${{ matrix.arch }}.dmg"
          
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            chmod +x scripts/sign-dmg-sparkle.sh
            
            # 签名 DMG
            SIGNATURE_OUTPUT=$(./scripts/sign-dmg-sparkle.sh "$DMG_FILE" 2>&1)
            
            # 提取签名和文件大小
            ED_SIGNATURE=$(echo "$SIGNATURE_OUTPUT" | grep "sparkle:edSignature" | sed 's/sparkle:edSignature="//' | sed 's/"//')
            FILE_LENGTH=$(stat -f%z "$DMG_FILE")
            
            # 保存签名信息到文件
            echo "ARCH=${{ matrix.arch }}" >> sparkle-signatures.txt
            echo "SIGNATURE=$ED_SIGNATURE" >> sparkle-signatures.txt
            echo "LENGTH=$FILE_LENGTH" >> sparkle-signatures.txt
            echo "DMG_NAME=$DMG_FILE" >> sparkle-signatures.txt
            echo "---" >> sparkle-signatures.txt
            
            echo "Sparkle signature saved for ${{ matrix.arch }}"
          else
            echo "Skipping Sparkle signing (SPARKLE_PRIVATE_KEY not set)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            rust-redis-desktop-${{ matrix.arch }}.dmg
            sparkle-signatures.txt
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Install NSIS and ImageMagick
        run: choco install nsis imagemagick -y

      - name: Prepare installer resources
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          
          mkdir -p installer/app
          cp target/release/rust-redis-desktop.exe installer/app/
          
          magick icons/icon.png -resize 256x256 -background transparent -gravity center -extent 256x256 icon.ico
          cp icon.ico installer/
          
          cp LICENSE installer/LICENSE.txt || echo "MIT License" > installer/LICENSE.txt
          
          sed "s/\${VERSION}/$version/g" scripts/installer.nsi > installer/installer.nsi

      - name: Build NSIS installer
        run: |
          cd installer
          makensis installer.nsi
          mv rust-redis-desktop-setup-*.exe ../rust-redis-desktop-x86_64-setup.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: rust-redis-desktop-x86_64-setup.exe
          retention-days: 1

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgl1-mesa-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config \
            file \
            desktop-file-utils \
            libxdo-dev \
            libfuse2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Prepare AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/metainfo

          cp target/release/rust-redis-desktop AppDir/usr/bin/

          cat > AppDir/rust-redis-desktop.desktop << 'EOF'
          [Desktop Entry]
          Name=Rust Redis Desktop
          Comment=A Redis desktop manager written in Rust
          Exec=rust-redis-desktop
          Icon=rust-redis-desktop
          Terminal=false
          Type=Application
          Categories=Development;Database;
          StartupWMClass=rust-redis-desktop
          EOF

          cp AppDir/rust-redis-desktop.desktop AppDir/usr/share/applications/

          cat > AppDir/usr/share/metainfo/rust-redis-desktop.metainfo.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>dev.yelog.rust-redis-desktop</id>
            <name>Rust Redis Desktop</name>
            <summary>A Redis desktop manager written in Rust</summary>
            <metadata_license>MIT</metadata_license>
            <project_license>MIT</project_license>
            <description>
              <p>A modern Redis desktop manager built with Rust, Dioxus, and Freya.</p>
            </description>
            <launchable type="desktop-id">rust-redis-desktop.desktop</launchable>
            <url type="homepage">https://github.com/yelog/rust-redis-desktop</url>
            <provides>
              <binary>rust-redis-desktop</binary>
            </provides>
          </component>
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/rust-redis-desktop" "$@"
          EOF
          chmod +x AppDir/AppRun

          touch AppDir/rust-redis-desktop.png

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir rust-redis-desktop-x86_64.AppImage

      - name: Build .deb package
        run: |
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/applications
          mkdir -p debian/usr/share/doc/rust-redis-desktop

          cp target/release/rust-redis-desktop debian/usr/bin/
          chmod 755 debian/usr/bin/rust-redis-desktop

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cat > debian/DEBIAN/control << EOF
          Package: rust-redis-desktop
          Version: ${VERSION}
          Section: database
          Priority: optional
          Architecture: amd64
          Maintainer: yelog <yelogeek@gmail.com>
          Description: A Redis desktop manager written in Rust
           A modern Redis desktop manager built with Rust, Dioxus, and Freya.
           Features include:
           - Database Management
           - Data Visualization
           - Key Inspection and Editing
           - Command Execution
           - Cross-Platform Support
          Homepage: https://github.com/yelog/rust-redis-desktop
          EOF

          cat > debian/usr/share/applications/rust-redis-desktop.desktop << 'EOF'
          [Desktop Entry]
          Name=Rust Redis Desktop
          Comment=A Redis desktop manager written in Rust
          Exec=/usr/bin/rust-redis-desktop
          Icon=rust-redis-desktop
          Terminal=false
          Type=Application
          Categories=Development;Database;
          EOF

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          dpkg-deb --build debian "rust-redis-desktop_${VERSION}_amd64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            rust-redis-desktop-x86_64.AppImage
            rust-redis-desktop_*_amd64.deb
          retention-days: 1

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: find artifacts -type f

      - name: Generate appcast.xml
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IS_PRERELEASE="${{ contains(github.ref_name, '-') }}"
          
          # 合合并签名信息
          cat artifacts/macos-x86_64/sparkle-signatures.txt > sparkle-signatures-all.txt || true
          cat artifacts/macos-aarch64/sparkle-signatures.txt >> sparkle-signatures-all.txt || true
          
          # 解析签名
          X86_SIGNATURE=$(grep -A3 "ARCH=x86_64" sparkle-signatures-all.txt | grep "SIGNATURE=" | cut -d= -f2 || echo "")
          X86_LENGTH=$(grep -A3 "ARCH=x86_64" sparkle-signatures-all.txt | grep "LENGTH=" | cut -d= -f2 || stat -c%s "artifacts/macos-x86_64/rust-redis-desktop-x86_64.dmg" 2>/dev/null || echo "0")
          
          ARM_SIGNATURE=$(grep -A3 "ARCH=aarch64" sparkle-signatures-all.txt | grep "SIGNATURE=" | cut -d= -f2 || echo "")
          ARM_LENGTH=$(grep -A3 "ARCH=aarch64" sparkle-signatures-all.txt | grep "LENGTH=" | cut -d= -f2 || stat -c%s "artifacts/macos-aarch64/rust-redis-desktop-aarch64.dmg" 2>/dev/null || echo "0")
          
          # 生成 appcast.xml
          chmod +x scripts/generate-appcast.sh
          ./scripts/generate-appcast.sh "$VERSION" "$X86_SIGNATURE" "$X86_LENGTH" "$ARM_SIGNATURE" "$ARM_LENGTH" "$IS_PRERELEASE" "$SPARKLE_PUBLIC_KEY"
          
          # 创建 GitHub Pages 目录
          mkdir -p pages-output
          cp appcast.xml pages-output/
          
          echo "appcast.xml generated"

      - name: Check Sparkle secrets
        id: check-sparkle
        run: |
          if [ -n "${{ secrets.SPARKLE_PRIVATE_KEY }}" ]; then
            echo "has_sparkle=true" >> $GITHUB_OUTPUT
          else
            echo "has_sparkle=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload appcast to pages artifact
        if: steps.check-sparkle.outputs.has_sparkle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: appcast-pages
          path: pages-output/
          retention-days: 1

      - name: Deploy appcast to GitHub Pages
        if: steps.check-sparkle.outputs.has_sparkle == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages-output
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-x86_64/*.dmg
            artifacts/macos-aarch64/*.dmg
            artifacts/windows-x86_64/*.exe
            artifacts/linux-x86_64/*.AppImage
            artifacts/linux-x86_64/*.deb
            appcast.xml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
